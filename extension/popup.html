<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 220px;
      padding: 16px;
      background: #0f0f0f;
      color: #fff;
    }
    .title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 12px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }
    .time {
      font-size: 12px;
      color: #666;
      border-top: 1px solid #222;
      padding-top: 10px;
    }
    .time span { color: #aaa; }
  </style>
</head>
<body>
  <div class="title">timectx</div>
  <div class="status">
    <div class="dot"></div>
    <span>Active on claude.ai</span>
  </div>
  <div class="time">Injecting: <span id="dt"></span></div>
  <script src="popup.js"></script>
</body>
</html>
